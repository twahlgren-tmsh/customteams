<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Taylor Made — Custom Orders</title>
<meta name="theme-color" content="#045863">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Custom Orders">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/icon-180.png">
<link rel="icon" type="image/png" href="/icon.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  color-scheme: light;
  --serif:'The Seasons','Didot','Hoefler Text','Cormorant Garamond',Georgia,'Times New Roman',serif;
  --sans:'Avenir Next','Avenir','Century Gothic',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --dark:#045863; --teal:#00acb2; --aqua:#91d5d4; --green:#cdeec2;
  --bg:#f3faf9; --panel:#ffffff; --ink:#143a40; --muted:#6f8c8f;
  --line:#e3efee; --chip:#eef7f6; --soft:#e8f6f5;
  --shadow:0 1px 2px rgba(4,88,99,.05),0 10px 30px rgba(4,88,99,.07);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font:14.5px/1.55 var(--sans);-webkit-font-smoothing:antialiased}
.app{max-width:1220px;margin:0 auto;padding:0 18px 30px}
button{font-family:var(--sans);cursor:pointer}
.btn{border:1px solid var(--teal);background:var(--teal);color:#fff;border-radius:999px;padding:8px 15px;font-size:13px;font-weight:600}
.btn:hover{filter:brightness(1.05)}
.btn.ghost{background:#fff;color:var(--teal)}
.btn.tiny{padding:5px 11px;font-size:12px}
.btn.danger{border-color:#e3a3a3;background:#fff;color:#b14b4b}
.btn[disabled]{opacity:.6;cursor:default}
.link{background:none;border:none;color:var(--teal);font-size:12.5px;font-weight:600;padding:0}

/* login */
#login{position:fixed;inset:0;background:linear-gradient(135deg,var(--dark),var(--teal));display:flex;align-items:center;justify-content:center;z-index:100}
#login .card{background:#fff;border-radius:20px;padding:34px 30px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,.25);text-align:center}
#login .mk{width:62px;height:62px;border-radius:50%;background:linear-gradient(135deg,var(--dark),var(--teal));margin:0 auto 14px;display:flex;align-items:center;justify-content:center}
#login .mk span{font-family:var(--serif);font-style:italic;color:#fff;font-size:28px}
#login h1{font-family:var(--serif);font-weight:500;margin:0 0 2px;color:var(--dark);font-size:24px}
#login p{margin:0 0 18px;color:var(--muted);font-size:12px;letter-spacing:.16em;text-transform:uppercase}
#login input{width:100%;margin-bottom:10px;padding:11px 13px;border:1px solid var(--line);border-radius:10px;font:14px var(--sans);outline:none}
#login input:focus{border-color:var(--teal)}
#login .btn{width:100%;padding:11px;font-size:14px}
#login .err{color:#b14b4b;font-size:12.5px;min-height:16px;margin-top:8px}

.hero{background:linear-gradient(120deg,var(--dark) 0%,#067a85 55%,var(--teal) 100%);color:#fff;border-radius:0 0 22px 22px;padding:22px 26px 24px;margin:0 -18px 18px;box-shadow:0 12px 30px rgba(4,88,99,.18)}
.herorow{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.mark{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;flex:none}
.mark span{font-family:var(--serif);font-size:24px;color:var(--dark);font-style:italic}
.wordmark h1{font-family:var(--serif);font-weight:500;font-size:30px;margin:0;letter-spacing:.5px;line-height:1}
.wordmark p{margin:4px 0 0;font-size:11.5px;letter-spacing:.28em;text-transform:uppercase;color:rgba(255,255,255,.82)}
.heroactions{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.heroactions .btn{border-color:rgba(255,255,255,.6)}
.heroactions .btn.ghost{background:rgba(255,255,255,.95)}
.rolechip{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.5);color:#fff;border-radius:999px;padding:6px 12px;font-size:12px;font-weight:700}
.search{position:relative;min-width:200px;flex:1;max-width:380px;margin-top:14px}
.search input{width:100%;padding:11px 14px 11px 38px;border:none;border-radius:999px;background:rgba(255,255,255,.95);font:14px var(--sans);color:var(--ink);outline:none}
.search svg{position:absolute;left:13px;top:11px;color:var(--teal)}

.stats{display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:13px 20px;box-shadow:var(--shadow);flex:1;min-width:110px}
.stat b{font-family:var(--serif);font-size:26px;display:block;line-height:1;color:var(--dark)}
.stat span{color:var(--muted);font-size:11px;letter-spacing:.04em;text-transform:uppercase}
.stat.fin b{color:var(--teal)}
.stat.click{cursor:pointer}
.stat.click:hover{border-color:var(--aqua)}
.stat.click.on{background:var(--soft);border-color:var(--teal)}
.drange{display:flex;gap:6px;flex-wrap:wrap;width:100%;margin-bottom:2px}
.drange button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:4px 12px;font-size:12px;font-weight:600;color:var(--muted)}
.drange button.on{background:var(--teal);color:#fff;border-color:var(--teal)}

.grid{display:grid;grid-template-columns:330px 1fr;gap:18px;align-items:start}
@media(max-width:820px){.grid{grid-template-columns:1fr}}
.list{background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);overflow:hidden;max-height:82vh;overflow-y:auto}
.lhead{padding:11px 14px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;z-index:2;display:flex;align-items:center;gap:8px}
.lhead .btn{margin-left:auto}
.addcust{padding:12px 14px;border-bottom:1px solid var(--line);background:#fafdfd;display:none}
.addcust.open{display:block}
.addcust input{width:100%;margin-bottom:7px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font:13px var(--sans)}
.cust{padding:13px 15px;border-bottom:1px solid var(--line);cursor:pointer;display:flex;gap:10px;align-items:flex-start}
.cust:hover{background:#f4fbfa}
.cust.active{background:var(--soft);box-shadow:inset 3px 0 0 var(--teal)}
.cust .nm{font-weight:600;color:var(--ink)}
.cust .sub{color:var(--muted);font-size:12px;margin-top:1px}
.cust .right{margin-left:auto;text-align:right;white-space:nowrap}
.cust .cnt{font-size:11.5px;color:var(--muted)}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 9px;border-radius:999px}
.badge.rep{background:var(--green);color:#2c6b4f}
.badge.type{background:var(--chip);color:var(--dark);margin:3px 3px 0 0}
.badge.st{background:var(--aqua);color:#0a4a52}
.badge.st.prog{background:#fdeecb;color:#8a6a18}
.badge.st.order{background:#e7e1f6;color:#5a4a8a}
.badge.st.deliv{background:var(--green);color:#2c6b4f}

.detail{background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);min-height:340px}
.empty{padding:90px 30px;text-align:center;color:var(--muted);font-family:var(--serif);font-style:italic;font-size:18px}
.dhead{padding:22px 26px 18px;border-bottom:1px solid var(--line);display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap;background:linear-gradient(180deg,#fbfefe,#fff)}
.dhead h2{font-family:var(--serif);font-weight:500;margin:0;font-size:26px;color:var(--dark)}
.dhead .meta{color:var(--muted);font-size:13px;margin-top:4px}
.dhead .acts{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.timeline-wrap{padding:18px 26px 26px}
.tl-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.13em;margin:2px 0 12px}
.order{border:1px solid var(--line);border-radius:16px;margin-bottom:18px;overflow:hidden}
.ohead{display:flex;gap:10px;align-items:center;padding:13px 18px;background:linear-gradient(90deg,var(--soft),#fbfefe);border-bottom:1px solid var(--line);flex-wrap:wrap}
.ohead .onum{font-family:var(--serif);font-weight:600;font-size:16px;color:var(--dark)}
.ohead .odate{color:var(--muted);font-size:12.5px}
.ohead .oacts{margin-left:auto;display:flex;gap:6px;align-items:center}
.progress{height:6px;background:#e7f1f0;border-radius:999px;margin:2px 18px 0;overflow:hidden}
.progress > i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--aqua))}
.tl{display:flex;padding:16px 12px 8px;overflow-x:auto}
.step{flex:1 0 92px;text-align:center;position:relative;cursor:pointer}
.step:hover .dot{border-color:var(--teal);box-shadow:0 0 0 3px var(--soft)}
.step:before{content:'';position:absolute;left:-50%;top:11px;width:100%;height:2px;background:#dde9e8;z-index:0}
.step:first-child:before{display:none}
.step.done:before{background:var(--teal)}
.step .dot{width:22px;height:22px;border-radius:50%;margin:0 auto;background:#e3efee;border:2px solid #cfe6e4;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;position:relative;z-index:1}
.step.done .dot{background:var(--teal);border-color:var(--teal)}
.step .lab{font-size:10px;color:var(--muted);margin-top:6px;line-height:1.25}
.step.done .lab{color:var(--ink)}
.step .dt{font-size:9px;color:var(--teal);margin-top:2px;min-height:11px}
.obody{display:grid;grid-template-columns:1.5fr .8fr;gap:0;border-top:1px solid var(--line)}
@media(max-width:640px){.obody{grid-template-columns:1fr}}
.fields{padding:14px 18px}
.f{display:flex;gap:12px;padding:5px 0;border-bottom:1px dashed var(--line)}
.f:last-child{border-bottom:none}
.f .k{width:128px;flex:none;color:var(--muted);font-size:12px}
.f .v{font-size:14px}
.f .v.dl{font-weight:700;color:#b14b4b}
.mock{border-left:1px solid var(--line);padding:14px 18px;display:flex;flex-direction:column;gap:8px}
.mockbox{flex:1;min-height:140px;border:1.5px dashed var(--aqua);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#7bb6b5;text-align:center;gap:6px;cursor:pointer;overflow:hidden}
.mockbox img{max-width:100%;max-height:240px;border-radius:10px}
.mockbox.haspic{border-style:solid;border-color:var(--line);cursor:zoom-in;position:relative}
.mockbox.haspic:after{content:"⤢";position:absolute;top:6px;right:8px;background:rgba(4,88,99,.78);color:#fff;font-size:13px;line-height:1;padding:4px 6px;border-radius:6px;opacity:0;transition:opacity .15s}
.mockbox.haspic:hover:after{opacity:1}
.mockbox .mi{font-size:28px}
.mockacts{display:flex;gap:14px;justify-content:center}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.86);display:none;align-items:center;justify-content:center;z-index:9999;cursor:zoom-out}
.lightbox.open{display:flex}
.lightbox img{max-width:94vw;max-height:94vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.lightbox .lbx{position:absolute;top:16px;right:24px;color:#fff;font-size:40px;line-height:1;cursor:pointer;font-weight:300}
.fin{margin:0 18px 16px;border:1px solid #dcebe9;border-radius:14px;overflow:hidden}
.fin .fh{background:linear-gradient(90deg,#063f47,#0a6b74);color:#fff;padding:8px 14px;font-size:11px;letter-spacing:.12em;text-transform:uppercase}
.fin .fb{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:1px;background:var(--line)}
.fin .fc{background:#fff;padding:10px 14px}
.fin .fc .l{font-size:11px;color:var(--muted)}
.fin .fc .n{font-size:15px;font-weight:600;margin-top:2px}
.fin .fc.hl{background:#f2fbf9}.fin .fc.hl .n{color:var(--dark);font-family:var(--serif);font-size:17px}
.fin .fc.est .n{color:#b06a00}.fin .fc.est .l::after{content:' ~';color:#b06a00}
.finnote{font-size:11px;color:#b06a00;padding:6px 14px;background:#fff8ef;border-top:1px solid var(--line)}
.drange input[type=date]{border:1px solid var(--line);border-radius:8px;padding:3px 8px;font-size:12px;color:var(--muted)}
.drange .dsep{align-self:center;color:var(--muted)}
.edit{padding:16px 18px;background:#fbfefe}
.erow{display:grid;grid-template-columns:repeat(2,1fr);gap:10px 14px;margin-bottom:10px}
@media(max-width:560px){.erow{grid-template-columns:1fr}}
.fld label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;margin-bottom:3px}
.fld input,.fld textarea{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:9px;font:13.5px var(--sans);outline:none}
.fld.full{grid-column:1/-1}
.types{display:flex;gap:14px;flex-wrap:wrap;padding-top:4px}
.types label{display:flex;gap:6px;align-items:center;font-size:13px;color:var(--ink)}
.secthead{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--dark);margin:14px 0 8px;padding-top:12px;border-top:1px dashed var(--line);font-weight:700}
.msgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px 14px}
.ms1{display:flex;align-items:center;gap:8px}.ms1 .mname{flex:1;font-size:12.5px}
.ms1 input[type=date]{width:130px;padding:5px 7px;font-size:12px;border:1px solid var(--line);border-radius:7px}
.editbar{display:flex;gap:8px;margin-top:14px;align-items:center}.editbar .right{margin-left:auto;display:flex;gap:8px}
.pending{padding:18px 22px 26px}
.ptab{width:100%;border-collapse:collapse}
.ptab th{text-align:left;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:6px 10px;border-bottom:1px solid var(--line)}
.ptab td{padding:10px;border-bottom:1px solid var(--line);font-size:13.5px}
.ptab tr{cursor:pointer}.ptab tr:hover td{background:#f6fbfb}
.dl-chip{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap}
.dl-over{background:#fdecea;color:#b14b4b}.dl-soon{background:#fdeecb;color:#8a6a18}.dl-ok{background:var(--soft);color:#0a6b74}.dl-none{background:#eef2f5;color:#8295a0}
.foot{color:var(--muted);font-size:11.5px;text-align:center;padding:10px 14px 0}
.hidden{display:none!important}
#toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(40px);background:var(--dark);color:#fff;padding:12px 20px;border-radius:12px;box-shadow:0 10px 30px rgba(4,88,99,.3);font-size:13.5px;font-weight:600;max-width:90%;opacity:0;transition:.25s;z-index:120;white-space:pre-line}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}#toast.err{background:#9c3b3b}

.anabody{padding:16px 22px 26px}
.anabody .drange{margin-bottom:14px}
.anagrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:4px}
.anagrid .stat{min-width:0}

/* in-progress / analytics open above the order list on small screens */
@media(max-width:820px){.grid.topview .detail{order:-1}}

/* ---------- mobile phone ---------- */
@media(max-width:600px){
  .anabody{padding:14px}
  .anagrid{grid-template-columns:repeat(2,1fr);gap:8px}
  .app{padding:0 12px 24px}
  .hero{padding:calc(14px + env(safe-area-inset-top)) 16px 18px;margin:0 -12px 14px;border-radius:0 0 18px 18px}
  .herorow{gap:12px}
  .mark{width:42px;height:42px}.mark span{font-size:20px}
  .wordmark h1{font-size:22px}.wordmark p{font-size:9.5px;letter-spacing:.2em}
  .heroactions{width:100%;margin:10px 0 0;gap:8px;flex-wrap:wrap}
  .heroactions .btn.tiny{padding:9px 14px;font-size:13px;flex:1;min-width:72px;text-align:center}
  .rolechip{order:-1}
  .search{max-width:none;margin-top:12px}
  .search input{padding:12px 14px 12px 38px;font-size:16px}
  .stats{gap:8px}
  .stat{padding:11px 13px;min-width:calc(50% - 4px);flex:1 1 calc(50% - 4px)}
  .stat b{font-size:21px}
  .drange button{padding:6px 13px}
  .grid{gap:12px}
  .list{max-height:none}
  .cust{padding:14px 14px}
  .dhead{padding:16px 16px 14px}.dhead h2{font-size:20px}
  .dhead .acts{width:100%;margin-left:0}
  .timeline-wrap{padding:14px 12px 20px}
  .order{margin-bottom:14px}
  .obody{grid-template-columns:1fr}
  .fields{padding:12px 14px}.f{gap:8px}.f .k{width:104px;flex:none}
  .fin{margin:0 12px 14px}
  .step{flex:0 0 78px}
  .edit{padding:14px}
  .erow{grid-template-columns:1fr}
  .fld input,.fld textarea{font-size:16px}
  #login input{font-size:16px}
}
</style>
</head>
<body>

<div id="login">
  <div class="card">
    <div class="mk"><span>tm</span></div>
    <h1>Taylor Made</h1><p>Custom Orders</p>
    <input id="liEmail" type="email" placeholder="Email" autocomplete="username">
    <input id="liPass" type="password" placeholder="Password" autocomplete="current-password">
    <button class="btn" id="liBtn">Sign in</button>
    <div class="err" id="liErr"></div>
  </div>
</div>

<div class="app hidden" id="appWrap">
  <div class="hero">
    <div class="herorow">
      <div class="mark"><span>tm</span></div>
      <div class="wordmark"><h1>Taylor Made</h1><p>Scrub Hats · Custom Orders</p></div>
      <div class="heroactions">
        <button class="btn ghost tiny" id="refreshBtn">↻ Refresh</button>
        <span class="rolechip" id="roleChip">Team</span>
        <button class="btn ghost tiny" id="importBtn">⤒ Import</button>
        <input type="file" id="importFile" accept="application/json" class="hidden">
        <button class="btn ghost tiny" id="logoutBtn">Sign out</button>
      </div>
    </div>
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="q" placeholder="Search name, email, order #, internal name…" autocomplete="off">
    </div>
  </div>
  <div class="stats" id="stats"></div>
  <div class="grid">
    <div class="list">
      <div class="lhead"><span id="lcount"></span><button class="btn tiny" id="addCustBtn">+ Customer</button></div>
      <div class="addcust" id="addCust">
        <input id="ncName" placeholder="Customer / team name"><input id="ncContact" placeholder="Contact name">
        <button class="btn tiny" id="ncSave">Add</button><button class="link" id="ncCancel" style="margin-left:8px">Cancel</button>
      </div>
      <div id="custlist"></div>
    </div>
    <div class="detail" id="detail"><div class="empty">Select a customer.</div></div>
  </div>
  <div class="foot">Live database · synced to Shopify &amp; Clockify · Team view hides financials</div>
</div>
<div id="toast"></div>

<script>
const SUPABASE_URL='https://mvspfxwiuipswvjwvlsv.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12c3BmeHdpdWlwc3d2and2bHN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MjQwODUsImV4cCI6MjA5NjIwMDA4NX0.E4EH90lNuWSoARXXQ2jVJF280aaPjyUFrZha7HbPKJc';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const MILE=[
 {key:'placed',label:'Order placed'},
 {key:'digitizing',label:'Digitizing logo',when:o=>!!(o.digitizing||(o.ms&&o.ms.digitizing))},
 {key:'materials',label:'Materials ordered'},
 {key:'cut',label:'Fabric cut'},
 {key:'embroidery',label:'Embroidery complete',when:o=>hasType(o,'Embroidery')},
 {key:'sewing',label:'Sewing complete'},
 {key:'packaged',label:'Inspection / folded'},
 {key:'shipped',label:'Shipped'},
 {key:'delivered',label:'Delivered'}];
const PRODKEYS=['digitizing','materials','cut','embroidery','sewing','packaged'];
function hasType(o,t){return (o.type||[]).indexOf(t)>=0;}
function effDeadline(o){return o.ideadline||o.deadline||'';}
function mApplies(o,m){return m.when?m.when(o):true;}

let state=[], sel=null, editing=null, view='detail', isLead=false, profileName='';
let _tt=null; function toast(m,e){const el=document.getElementById('toast');el.textContent=m;el.className='show'+(e?' err':'');clearTimeout(_tt);_tt=setTimeout(()=>el.className='',5000);}
const monthFmt={year:'numeric',month:'short',day:'numeric'};
function d(s){return s?new Date(s+'T00:00:00').toLocaleDateString('en-US',monthFmt):'—';}
function dshort(s){return s?new Date(s+'T00:00:00').toLocaleDateString('en-US',{month:'numeric',day:'numeric'}):'';}
function today(){return new Date().toISOString().slice(0,10);}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function num(v){const n=parseFloat(v);return isNaN(n)?null:n;}
function money(v){const n=num(v);return n===null?'—':'$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function laborOf(f){const l=num(f.lab);if(l&&l>0)return l;return (f&&f.labEst)||0;}
function laborIsEst(f){const l=num(f.lab);return !(l&&l>0)&&f&&f.labEst!=null;}
function profit(f){const i=num(f.inv);if(i===null)return null;return i-laborOf(f)-(num(f.mat)||0)-(num(f.shipCost)||0);}
function margin(f){const p=profit(f),i=num(f.inv);if(p===null||!i)return null;return Math.round(p/i*100);}
function latest(c){return c.orders.map(o=>o.date).filter(Boolean).sort().slice(-1)[0]||'';}
function typeTags(t){return (t||[]).map(x=>'<span class="badge type">'+x+'</span>').join('');}
const STATUS_LABEL={placed:'Ordered',digitizing:'Digitizing done',materials:'Materials ordered',cut:'Fabric cut',embroidery:'Embroidery complete',sewing:'Sewing complete',packaged:'Inspection / folded',shipped:'Shipped',delivered:'Delivered'};
function derivedStatus(o){o.ms=o.ms||{};const steps=MILE.filter(m=>mApplies(o,m));let last='placed';for(const m of steps){if(o.ms[m.key]&&o.ms[m.key].done)last=m.key;}return STATUS_LABEL[last]||'Ordered';}
function statusPill(s){const c=s==='Delivered'?'deliv':(s==='Shipped'?'':(s==='Ordered'?'order':'prog'));return '<span class="badge st '+c+'">'+s+'</span>';}

/* ---------- auth ---------- */
async function initAuth(){
  const recovering=location.hash.indexOf('type=recovery')>=0;
  sb.auth.onAuthStateChange((event,s)=>{ if(event==='PASSWORD_RECOVERY'||(recovering&&event==='SIGNED_IN')){showRecovery();return;} if(s) enterApp(); else showLogin(); });
  if(!recovering){ const {data:{session}}=await sb.auth.getSession(); if(session) enterApp(); else showLogin(); }
}
function showRecovery(){
  document.getElementById('appWrap').classList.add('hidden');
  const lg=document.getElementById('login');lg.classList.remove('hidden');
  lg.querySelector('.card').innerHTML='<div class="mk"><span>tm</span></div><h1>Set a new password</h1><p>Account recovery</p><input id="npPass" type="password" placeholder="New password (min 6 characters)" autocomplete="new-password"><button class="btn" id="npBtn">Update password</button><div class="err" id="npErr"></div>';
  const go=async()=>{const pw=document.getElementById('npPass').value;const er=document.getElementById('npErr');
    if(!pw||pw.length<6){er.textContent='Password must be at least 6 characters.';return;}
    const {error}=await sb.auth.updateUser({password:pw});
    if(error){er.textContent=error.message;return;}
    er.style.color='#2c6b4f';er.textContent='Password updated! Loading your account…';
    setTimeout(()=>{location.href=location.pathname;},1400);};
  document.getElementById('npBtn').onclick=go;
  document.getElementById('npPass').addEventListener('keydown',e=>{if(e.key==='Enter')go();});
}
function showLogin(){document.getElementById('login').classList.remove('hidden');document.getElementById('appWrap').classList.add('hidden');}
async function enterApp(){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('appWrap').classList.remove('hidden');
  const {data:{user}}=await sb.auth.getUser();
  const {data:prof}=await sb.from('profiles').select('role,full_name').eq('id',user.id).maybeSingle();
  isLead = prof && prof.role==='lead';
  profileName = (prof&&prof.full_name)||user.email;
  document.getElementById('roleChip').textContent = isLead?'Lead':'Team';
  document.getElementById('importBtn').style.display = isLead?'':'none';
  await loadData(); render();
}
document.getElementById('liBtn').onclick=async()=>{
  const email=document.getElementById('liEmail').value.trim(), pass=document.getElementById('liPass').value;
  document.getElementById('liErr').textContent='';
  const {error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error)document.getElementById('liErr').textContent=error.message;
};
document.getElementById('liPass').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('liBtn').click();});
document.getElementById('logoutBtn').onclick=async()=>{await sb.auth.signOut();};

/* ---------- data ---------- */
function mapOrder(o,fin){return {dbid:o.id,id:o.order_number,hats:o.total_hats,iname:o.internal_name||'',clockifyId:o.clockify_project_id,date:o.order_date,ship:o.ship_date||o.est_ship,est:o.est_ship,deadline:o.deadline,ideadline:o.internal_deadline,delivered:o.delivered_date,
  type:o.order_type||[],status:o.status,digitizing:o.has_digitizing,styles:o.styles,scrub:o.scrub_color,logo:o.logo,ribbon:o.ribbon,sewing:o.sewing_thread,emb:o.embroidery_thread,
  placement:o.placement,notes:o.notes,mockup:o.mockup_url,ms:o.milestones||{},fin:fin?{inv:fin.invoice_total,lab:fin.labor_cost,mat:fin.materials_cost,shipCharged:fin.shipping_charged,shipCost:fin.shipping_cost}:{}};}
async function loadData(){
  const {data:custs,error:e1}=await sb.from('customers').select('*');
  const {data:ords,error:e2}=await sb.from('orders').select('*');
  if(e1||e2){toast('Load error: '+((e1||e2).message),true);return;}
  let fins={};
  if(isLead){const {data:f}=await sb.from('order_financials').select('*');(f||[]).forEach(x=>fins[x.order_id]=x);}
  state=(custs||[]).map(c=>({id:c.id,name:c.name,contact:c.contact,email:c.email||c.contact_email||'',orders:(ords||[]).filter(o=>o.customer_id===c.id).map(o=>mapOrder(o,fins[o.id]))}));
  if(isLead) computeLaborEst();
}
/* avg labor-per-hat within each category (from orders with real Clockify labor), used to estimate orders that have none */
function orderCat(o){const t=o.type||[];if(t.indexOf('Embroidery')>=0)return 'emb';if(t.indexOf('Custom Print')>=0)return 'print';return null;}
function computeLaborEst(){
  const agg={emb:{lab:0,h:0},print:{lab:0,h:0}};
  state.forEach(c=>c.orders.forEach(o=>{const cat=orderCat(o);if(!cat)return;const lab=num(o.fin.lab),h=num(o.hats);if(lab&&lab>0&&h&&h>0){agg[cat].lab+=lab;agg[cat].h+=h;}}));
  const per={emb:agg.emb.h?agg.emb.lab/agg.emb.h:null,print:agg.print.h?agg.print.lab/agg.print.h:null};
  state.forEach(c=>c.orders.forEach(o=>{o.fin=o.fin||{};const lab=num(o.fin.lab);const shipped=!!(o.delivered||(o.ms&&o.ms.shipped&&o.ms.shipped.done));if(shipped&&!(lab&&lab>0)){const cat=orderCat(o),p=cat?per[cat]:null,h=num(o.hats);if(p&&h)o.fin.labEst=Math.round(p*h*100)/100;}}));
  window.__laborPer=per;
}

/* ---------- stats / list / pending / detail (render) ---------- */
function pendingOrders(){const out=[];state.forEach(c=>c.orders.forEach(o=>{const s=derivedStatus(o);if(s!=='Shipped'&&s!=='Delivered')out.push({c,o,s});}));const k=x=>effDeadline(x.o)||x.o.ship||'9999-99-99';out.sort((a,b)=>k(a).localeCompare(k(b)));return out;}
let statRange='all',cFrom='',cTo='';
function rangeStart(r){const n=new Date();if(r==='30')return new Date(n-30*864e5);if(r==='90')return new Date(n-90*864e5);if(r==='365')return new Date(n-365*864e5);if(r==='ytd')return new Date(n.getFullYear(),0,1);return null;}
function inStatRange(ds){if(statRange==='custom'){if(!ds)return false;if(cFrom&&ds<cFrom)return false;if(cTo&&ds>cTo)return false;return true;}if(statRange==='all')return true;const s=rangeStart(statRange);if(!s)return true;return !!ds&&new Date(ds+'T00:00:00')>=s;}
function renderStats(){
  const act=pendingOrders().length;
  const totAll=state.reduce((m,c)=>m+c.orders.length,0);
  const h='<div class="stat click'+(view==='pending'?' on':'')+'" id="pendStat"><b>'+act+'</b><span>In progress ▸</span></div>'+
    (isLead?'<div class="stat click'+(view==='analytics'?' on':'')+'" id="anaStat"><b>'+totAll+'</b><span>Analytics ▸</span></div>':'<div class="stat"><b>'+totAll+'</b><span>Total orders</span></div>');
  document.getElementById('stats').innerHTML=h;
  const ps=document.getElementById('pendStat');if(ps)ps.onclick=()=>{view=view==='pending'?'detail':'pending';render();if(view==='pending')mScroll();};
  const as=document.getElementById('anaStat');if(as)as.onclick=()=>{view=view==='analytics'?'detail':'analytics';render();if(view==='analytics')mScroll();};
}
function rangeLabel(){const m={'30':'Last 30 days','90':'Last 90 days','ytd':'Year to date','365':'Last 12 months','all':'All time','custom':(cFrom||'…')+' → '+(cTo||'…')};return m[statRange]||'All time';}
function renderAnalytics(){
  const chips=[['30','30 days'],['90','90 days'],['ytd','YTD'],['365','1 year'],['all','All time'],['custom','Custom']];
  const ord=[];state.forEach(c=>c.orders.forEach(o=>{if(inStatRange(o.date))ord.push({c,o});}));
  const tot=ord.length;
  const custCount=new Set(ord.map(x=>x.c.id)).size;
  const rep=state.filter(c=>c.orders.filter(o=>inStatRange(o.date)).length>1).length;
  const hats=ord.reduce((m,x)=>m+(num(x.o.hats)||0),0);
  const avgHats=tot?Math.round(hats/tot):0;
  const td=[],dd=[];
  ord.forEach(({o})=>{if(o.date&&o.ship){const a=(new Date(o.ship)-new Date(o.date))/864e5;if(a>=0&&a<400)td.push(a);}if(o.date&&o.delivered){const b=(new Date(o.delivered)-new Date(o.date))/864e5;if(b>=0&&b<400)dd.push(b);}});
  const avg=a=>a.length?Math.round(a.reduce((s,v)=>s+v,0)/a.length):null;
  const tShip=avg(td),tDel=avg(dd);
  const typeCount={};ord.forEach(({o})=>(o.type||[]).forEach(t=>typeCount[t]=(typeCount[t]||0)+1));
  let inv=0,prof=0,mat=0,lab=0,ship=0,invN=0;
  ord.forEach(({o})=>{const f=o.fin||{};const i=num(f.inv);if(i!=null){inv+=i;invN++;}const p=profit(f);if(p!=null)prof+=p;mat+=num(f.mat)||0;lab+=laborOf(f);ship+=num(f.shipCost)||0;});
  const aov=invN?inv/invN:null, avgMargin=inv?Math.round(prof/inv*100):null;
  const card=(l,v,x)=>'<div class="stat '+(x||'')+'"><b>'+v+'</b><span>'+l+'</span></div>';
  const chipsH='<div class="drange">'+chips.map(([k,l])=>'<button data-range="'+k+'" class="'+(statRange===k?'on':'')+'">'+l+'</button>').join('')+(statRange==='custom'?'<input type="date" id="cfrom" value="'+cFrom+'" title="From"><span class="dsep">–</span><input type="date" id="cto" value="'+cTo+'" title="To">':'')+'</div>';
  let body='<div class="secthead" style="border-top:none;padding-top:0">Volume</div><div class="anagrid">'+
    card('Customers',custCount)+card('Orders',tot)+card('Repeat customers',rep)+card('Total hats',hats)+card('Avg hats / order',avgHats)+'</div>';
  body+='<div class="secthead">Production timing</div><div class="anagrid">'+
    card('Avg order → shipped',tShip==null?'—':tShip+' days')+card('Avg order → delivered',tDel==null?'—':tDel+' days')+'</div>';
  if(isLead){body+='<div class="secthead">Financials</div><div class="anagrid">'+
    card('Invoiced',money(inv),'fin')+card('Profit',money(prof),'fin')+card('Avg order value',money(aov),'fin')+card('Avg margin',avgMargin==null?'—':avgMargin+'%','fin')+
    card('Avg profit / order',money(tot?prof/tot:null),'fin')+card('Avg materials / order',money(tot?mat/tot:null),'fin')+card('Avg labor / order',money(tot?lab/tot:null),'fin')+card('Avg shipping cost / order',money(tot?ship/tot:null),'fin')+'</div>';}
  const types=Object.keys(typeCount);
  if(types.length){body+='<div class="secthead">Order mix</div><div class="anagrid">'+types.map(t=>card(t,typeCount[t])).join('')+'</div>';}
  document.getElementById('detail').innerHTML='<div class="dhead"><div><h2>Analytics</h2><div class="meta">'+rangeLabel()+' · '+tot+' order'+(tot===1?'':'s')+'</div></div><div class="acts"><button class="link" data-closeana="1">Close</button></div></div><div class="anabody">'+chipsH+body+'</div>';
  document.querySelectorAll('#detail [data-range]').forEach(b=>b.onclick=()=>{statRange=b.dataset.range;renderDetail();});
  const cf=document.getElementById('cfrom'),ct=document.getElementById('cto');
  if(cf)cf.onchange=()=>{cFrom=cf.value;renderDetail();};
  if(ct)ct.onchange=()=>{cTo=ct.value;renderDetail();};
}
function custTitle(c){const o=[...c.orders].sort((a,b)=>(b.date||'').localeCompare(a.date||''))[0];return (o&&o.iname)||c.name;}
function custInames(c){return c.orders.map(o=>o.iname||'').join(' ');}
function custOrderNums(c){return c.orders.map(o=>String(o.id||'')).join(' ');}
function emailOf(c){const m=((c.email||'')+' '+(c.contact||'')).match(/[^\s·,;|<>]+@[^\s·,;|<>]+\.[^\s·,;|<>]+/);return m?m[0]:'';}
function contactName(c){let s=(c.contact||'');const e=emailOf(c);if(e)s=s.replace(e,'');return s.replace(/[·,;|]+/g,' ').replace(/\s+/g,' ').trim();}
function custSearchBlob(c){return [c.name,c.contact,c.email,custInames(c),custOrderNums(c)].join(' ').toLowerCase();}
function renderList(){
  const f=(document.getElementById('q').value||'').trim().toLowerCase();
  const rows=[...state].sort((a,b)=>latest(b).localeCompare(latest(a))).filter(c=>!f||custSearchBlob(c).includes(f));
  document.getElementById('lcount').textContent=rows.length+' order'+(rows.length===1?'':'s');
  document.getElementById('custlist').innerHTML=rows.map(c=>{const types=[...new Set(c.orders.flatMap(o=>o.type||[]))];const title=custTitle(c);const ce=emailOf(c),cp=contactName(c);const sub=(title!==c.name?esc(c.name)+' · ':'')+esc(cp||'—')+(ce?' · '+esc(ce):'');
    return '<div class="cust'+(sel===c.id?' active':'')+'" data-cust="'+c.id+'"><div><div class="nm">'+esc(title)+'</div><div class="sub">'+sub+'</div><div>'+typeTags(types)+'</div></div>'+
      '<div class="right"><div class="cnt">'+d(latest(c))+'</div>'+(c.orders.length>1?'<div class="badge rep">Repeat ×'+c.orders.length+'</div>':'<div class="cnt">'+c.orders.length+' order</div>')+'</div></div>';}).join('');
}
function timelineHTML(o){const steps=MILE.filter(m=>mApplies(o,m));const dc=steps.filter(m=>o.ms[m.key]&&o.ms[m.key].done).length;const pct=Math.round(dc/steps.length*100);
  let fp=steps.findIndex(m=>!(o.ms[m.key]&&o.ms[m.key].done));
  return '<div class="progress"><i style="width:'+pct+'%"></i></div><div class="tl">'+steps.map((m,i)=>{const v=o.ms[m.key]||{};return '<div class="step'+(v.done?' done':'')+'" data-step="'+m.key+'" data-so="'+o.dbid+'" title="Click to mark '+esc(m.label)+(v.done?' not done':' done today')+'"><div class="dot">'+(v.done?'✓':'')+'</div><div class="lab">'+m.label+'</div><div class="dt">'+(v.date?dshort(v.date):'')+'</div></div>';}).join('')+'</div>';}
function finHTML(o){if(!isLead)return '';const f=o.fin||{},p=profit(f),mg=margin(f),est=laborIsEst(f);const c=(l,v,x)=>'<div class="fc '+(x||'')+'"><div class="l">'+l+'</div><div class="n">'+v+'</div></div>';
  const labLine=est?c('Labor (est.)',money(f.labEst),'est'):c('Labor (Clockify)',money(f.lab));
  const note=est?'<div class="finnote">Labor estimated from average labor-per-hat in this category — replace with Clockify once linked.</div>':'';
  return '<div class="fin"><div class="fh">Financials — Lead only</div><div class="fb">'+c('Invoice',money(f.inv))+c('Materials',money(f.mat))+labLine+c('Ship collected',money(f.shipCharged))+c('Ship cost',money(f.shipCost))+c('Profit',p===null?'—':money(p)+(est?' *':''),'hl')+c('Margin',mg===null?'—':mg+'%','hl')+'</div>'+note+'</div>';}
function field(k,v,cls){return v?'<div class="f"><div class="k">'+k+'</div><div class="v'+(cls?' '+cls:'')+'">'+esc(v)+'</div></div>':'';}
function orderView(c,o,latestFlag){const s=derivedStatus(o);const del=o.ms.delivered&&o.ms.delivered.date?o.ms.delivered.date:'';const shipped=o.ms.shipped&&o.ms.shipped.done;
  const dlCls=v=>(v&&!shipped&&v<today())?'dl':'';
  const fields=field('Order #',o.id)+field('Order date',d(o.date))+field('Customer deadline',o.deadline?d(o.deadline):'',dlCls(o.deadline))+field('Goal completion',o.ideadline?d(o.ideadline):'',dlCls(o.ideadline))+field('Est. ship',d(o.est))+field('Delivered',del?d(del):'')+field('Type',(o.type||[]).join(', '))+field('Styles / qty',o.styles)+field('Scrub hat',o.scrub)+field('Logo',o.logo)+field('Ribbon / ties',o.ribbon)+field('Sewing thread',o.sewing)+field('Embroidery thread',o.emb)+field('Placement',o.placement)+field('Notes',o.notes);
  const mockInner=o.mockup?'<img src="'+o.mockup+'" alt="mockup">':'<div class="mi">🧢</div><div>Mockup</div><small>click to upload</small>';
  const mockBox=o.mockup?'<div class="mockbox haspic" data-zoom="'+o.dbid+'" title="Click to enlarge">'+mockInner+'</div>':'<div class="mockbox" data-mock="'+o.dbid+'">'+mockInner+'</div>';
  const mockActs=o.mockup?'<div class="mockacts"><button class="link" data-mock="'+o.dbid+'">Replace</button><button class="link" data-rmmock="'+o.dbid+'">Remove</button></div>':'';
  const title=o.iname?esc(o.iname):('#'+esc(o.id||''));const sub=(o.iname?'#'+esc(o.id||'')+' · ':'')+d(o.date);
  return '<div class="order"><div class="ohead"><span class="onum">'+title+'</span><span class="odate">'+sub+'</span>'+statusPill(s)+'<span class="oacts"><button class="btn ghost tiny" data-edit="'+o.dbid+'">Edit</button></span></div>'+timelineHTML(o)+finHTML(o)+'<div class="obody"><div class="fields">'+fields+'</div><div class="mock">'+mockBox+mockActs+'</div></div></div>';}
function fld(l,k,v,t){return '<div class="fld"><label>'+l+'</label><input data-k="'+k+'" type="'+(t||'text')+'" value="'+esc(v)+'"></div>';}
function finFld(l,k,v){return '<div class="fld"><label>'+l+'</label><input data-fk="'+k+'" type="number" step="0.01" value="'+(v==null?'':v)+'"></div>';}
function orderEdit(c,o){const tchk=t=>'<label><input type="checkbox" data-t="'+t+'" '+(hasType(o,t)?'checked':'')+'> '+t+'</label>';
  const ms=MILE.filter(m=>mApplies(o,m)).map(m=>{const v=o.ms[m.key]||{};return '<div class="ms1"><input type="checkbox" data-mdone="'+m.key+'" '+(v.done?'checked':'')+'><span class="mname">'+m.label+'</span><input type="date" data-mdate="'+m.key+'" value="'+(v.date||'')+'"></div>';}).join('');

function renderPending(){const rows=pendingOrders();
  const dl=o=>{const x=effDeadline(o)||o.ship;if(!x)return '<span class="dl-chip dl-none">no date</span>';const days=Math.round((new Date(x+'T00:00:00')-new Date(today()+'T00:00:00'))/86400000);const lbl=d(x)+(days<0?' · '+(-days)+'d late':(days===0?' · today':' · '+days+'d'));return '<span class="dl-chip '+(days<0?'dl-over':(days<=7?'dl-soon':'dl-ok'))+'">'+lbl+'</span>';};
  const body=rows.map(({c,o,s})=>'<tr data-go="'+c.id+'"><td><b>'+esc(c.name)+'</b><div style="color:var(--muted);font-size:12px">'+esc(c.contact||'')+'</div></td><td>#'+esc(o.id||'')+'</td><td>'+statusPill(s)+'</td><td>'+(o.type||[]).join(', ')+'</td><td>'+dl(o)+'</td></tr>').join('');
  document.getElementById('detail').innerHTML='<div class="dhead"><div><h2>In progress</h2><div class="meta">'+rows.length+' open · by deadline</div></div><div class="acts"><button class="link" data-closepend="1">Close</button></div></div><div class="pending">'+(rows.length?'<table class="ptab"><thead><tr><th>Customer</th><th>Order</th><th>Status</th><th>Type</th><th>Deadline</th></tr></thead><tbody>'+body+'</tbody></table>':'<div class="empty">All caught up! 🎉</div>')+'</div>';}
function renderDetail(){
  if(view==='pending'){renderPending();return;}
  if(view==='analytics'){if(!isLead){view='detail';}else{renderAnalytics();return;}}
  const c=state.find(x=>x.id===sel),el=document.getElementById('detail');
  if(!c){el.innerHTML='<div class="empty">Select a customer.</div>';return;}
  const orders=[...c.orders].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  el.innerHTML='<div class="dhead"><div><h2>'+esc(c.name)+'</h2><div class="meta">Contact · '+esc(contactName(c)||c.contact||'—')+(emailOf(c)?' · ✉ <a href="mailto:'+esc(emailOf(c))+'">'+esc(emailOf(c))+'</a>':'')+' · '+c.orders.length+' order'+(c.orders.length>1?'s':'')+'</div></div><div class="acts">'+(c.orders.length>1?'<span class="badge rep">Repeat customer</span>':'')+'<button class="link" data-editcust="'+c.id+'">Edit customer</button><button class="btn tiny" data-addorder="'+c.id+'">+ Add order</button></div></div><div class="timeline-wrap"><div class="tl-label">Order history · newest first</div>'+orders.map((o,i)=>editing===o.dbid?orderEdit(c,o):orderView(c,o,i===0)).join('')+'</div>';
}
function render(){renderStats();renderList();renderDetail();const g=document.querySelector('.grid');if(g)g.classList.toggle('topview',view==='pending'||view==='analytics'||(view==='detail'&&!!sel));}
function mScroll(){if(window.innerWidth<=820){const d=document.getElementById('detail');if(d)setTimeout(()=>d.scrollIntoView({behavior:'smooth',block:'start'}),60);}}

/* ---------- mutations ---------- */
function findOrder(dbid){for(const c of state){const o=c.orders.find(x=>x.dbid===dbid);if(o)return {c,o};}return null;}
async function clickStep(dbid,key){
  const fo=findOrder(dbid);if(!fo)return;const o=fo.o;o.ms=o.ms||{};
  const cur=o.ms[key]&&o.ms[key].done;
  o.ms[key]={done:!cur,date:!cur?today():''};
  const label=(MILE.find(m=>m.key===key)||{}).label||key;
  render();
  const upd={milestones:o.ms,status:derivedStatus(o),ship_date:(o.ms.shipped&&o.ms.shipped.date)||null,delivered_date:(o.ms.delivered&&o.ms.delivered.date)||null,updated_at:new Date().toISOString()};
  const {error}=await sb.from('orders').update(upd).eq('id',dbid);
  if(error){toast('Update failed: '+error.message,true);await loadData();render();}
  else toast(label+(cur?' cleared':' ✓ '+dshort(today())));
}
async function saveOrder(dbid){
  const form=document.querySelector('[data-form="'+dbid+'"]');const fo=findOrder(dbid);if(!fo)return;const o=fo.o;
  const g=k=>{const el=form.querySelector('[data-k="'+k+'"]');return el?el.value:o[k];};
  const ms=o.ms||{};form.querySelectorAll('[data-mdone]').forEach(cb=>{const k=cb.dataset.mdone;ms[k]=ms[k]||{};ms[k].done=cb.checked;});
  form.querySelectorAll('[data-mdate]').forEach(di=>{const k=di.dataset.mdate;ms[k]=ms[k]||{};ms[k].date=di.value;});
  const type=[...form.querySelectorAll('[data-t]:checked')].map(x=>x.dataset.t);
  const tmp={type,ms};const status=derivedStatus(tmp);
  const upd={order_number:g('id'),internal_name:g('iname')||null,order_date:g('date')||null,deadline:g('deadline')||null,internal_deadline:g('ideadline')||null,est_ship:g('est')||null,
    ship_date:(ms.shipped&&ms.shipped.date)||null,delivered_date:(ms.delivered&&ms.delivered.date)||null,
    order_type:type,status:status,styles:g('styles'),scrub_color:g('scrub'),logo:g('logo'),ribbon:g('ribbon'),
    sewing_thread:g('sewing'),embroidery_thread:g('emb'),placement:g('placement'),notes:g('notes'),milestones:ms,updated_at:new Date().toISOString()};
  const {error}=await sb.from('orders').update(upd).eq('id',dbid);
  if(error){toast('Save failed: '+error.message,true);return;}
  if(isLead){const gf=k=>{const el=form.querySelector('[data-fk='+k+']');return el?num(el.value):null;};const fin={order_id:dbid,invoice_total:gf('inv'),materials_cost:gf('mat'),labor_cost:gf('lab'),shipping_charged:gf('shipCharged'),shipping_cost:gf('shipCost'),updated_at:new Date().toISOString()};
    await sb.from('order_financials').upsert(fin);}
  if(isLead && (g('iname')||'').trim() && !o.clockifyId){ toast('Creating Clockify project…'); try{ const {data:cp}=await sb.functions.invoke('sync-orders',{body:{mode:'createproject',order_number:g('id')}}); if(cp&&cp.ok&&!cp.already)toast('Clockify project created ✓'); }catch(e){} }
  editing=null;await loadData();render();toast('Saved ✓');
}
async function addOrder(custId){const {data,error}=await sb.from('orders').insert({customer_id:custId,order_number:'NEW',order_date:today(),status:'Ordered',milestones:{placed:{done:true,date:today()}}}).select().single();
  if(error){toast(error.message,true);return;}editing=data.id;await loadData();render();}
async function delOrder(dbid){if(!confirm('Delete this order?'))return;await sb.from('orders').delete().eq('id',dbid);editing=null;await loadData();render();}
async function addCustomer(name,contact){const {data,error}=await sb.from('customers').insert({name,contact}).select().single();if(error){toast(error.message,true);return;}sel=data.id;view='detail';await loadData();render();}
async function editCustomer(id){const c=state.find(x=>x.id===id);const nn=prompt('Customer name:',c.name);if(nn===null)return;const nc=prompt('Contact:',c.contact||'');await sb.from('customers').update({name:nn,contact:nc===null?c.contact:nc}).eq('id',id);await loadData();render();}
async function uploadMock(dbid){const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.onchange=async()=>{const file=inp.files[0];if(!file)return;toast('Uploading mockup…');const path=dbid+'-'+Date.now()+'-'+file.name.replace(/[^a-zA-Z0-9.]/g,'_');const {error}=await sb.storage.from('mockups').upload(path,file,{upsert:true});if(error){toast('Upload failed: '+error.message,true);return;}const {data}=sb.storage.from('mockups').getPublicUrl(path);await sb.from('orders').update({mockup_url:data.publicUrl}).eq('id',dbid);await loadData();render();toast('Mockup added ✓');};inp.click();}

/* ---------- import (Lead) ---------- */
async function importJSON(data){
  if(!isLead){toast('Only a Lead can import.',true);return;}
  if(!confirm('Import will REPLACE all current data with this file. Continue?'))return;
  toast('Importing…');
  await sb.from('customers').delete().neq('id','00000000-0000-0000-0000-000000000000');
  for(const c of data){
    const {data:cust,error}=await sb.from('customers').insert({name:c.name,contact:c.contact}).select().single();
    if(error){toast('Import error: '+error.message,true);return;}
    for(const o of (c.orders||[])){
      const ms=o.ms||{};
      const {data:ord,error:e2}=await sb.from('orders').insert({customer_id:cust.id,order_number:o.id,order_date:o.date||null,deadline:o.deadline||null,est_ship:o.ship||null,
        ship_date:(ms.shipped&&ms.shipped.date)||null,delivered_date:(ms.delivered&&ms.delivered.date)||null,order_type:o.type||[],status:o.status||'Ordered',
        styles:o.styles,scrub_color:o.scrub,logo:o.logo,ribbon:o.ribbon,sewing_thread:o.sewing,embroidery_thread:o.emb,placement:o.placement,notes:o.notes,mockup_url:o.mockup,milestones:ms}).select().single();
      if(e2){toast('Import error: '+e2.message,true);return;}
      if(o.fin&&(o.fin.inv!=null||o.fin.lab!=null||o.fin.mat!=null)){
        await sb.from('order_financials').insert({order_id:ord.id,invoice_total:o.fin.inv,materials_cost:o.fin.mat,labor_cost:o.fin.lab});}
    }
  }
  await loadData();render();toast('Imported '+data.length+' customers ✓');
}

/* ---------- events ---------- */
document.addEventListener('click',e=>{
  const t=e.target.closest('[data-cust],[data-edit],[data-save],[data-cancel],[data-del],[data-addorder],[data-editcust],[data-mock],[data-rmmock],[data-zoom],[data-go],[data-closepend],[data-closeana],[data-step]');
  if(!t)return;
  if(t.dataset.zoom){const im=t.querySelector('img');if(im)openLightbox(im.src);return;}
  if(t.dataset.closeana){view='detail';render();return;}
  if(t.dataset.step){clickStep(t.dataset.so,t.dataset.step);}
  else if(t.dataset.cust){sel=t.dataset.cust;editing=null;view='detail';render();mScroll();}
  else if(t.dataset.go){sel=t.dataset.go;editing=null;view='detail';render();mScroll();}
  else if(t.dataset.closepend){view='detail';render();}
  else if(t.dataset.edit){editing=t.dataset.edit;renderDetail();}
  else if(t.dataset.cancel){editing=null;renderDetail();}
  else if(t.dataset.save){saveOrder(t.dataset.save);}
  else if(t.dataset.del){delOrder(t.dataset.del);}
  else if(t.dataset.addorder){addOrder(t.dataset.addorder);}
  else if(t.dataset.editcust){editCustomer(t.dataset.editcust);}
  else if(t.dataset.mock){uploadMock(t.dataset.mock);}
  else if(t.dataset.rmmock){sb.from('orders').update({mockup_url:null}).eq('id',t.dataset.rmmock).then(()=>loadData().then(render));}
});
document.getElementById('q').addEventListener('input',renderList);
document.getElementById('refreshBtn').onclick=async()=>{
  const b=document.getElementById('refreshBtn');b.disabled=true;const o=b.textContent;b.textContent='↻ Syncing…';
  try{
    toast('Pulling new orders from Shopify…');
    const {data,error}=await sb.functions.invoke('sync-orders');
    if(error){toast('Sync error — showing saved data');}
    else if(data&&data.ok){toast(`Synced ✓  +${data.created} new · ${data.updated} updated`);}
    else if(data&&data.error){toast('Sync: '+data.error);}
  }catch(e){toast('Sync unavailable — showing saved data');}
  await loadData();render();b.disabled=false;b.textContent=o;
};
document.getElementById('addCustBtn').onclick=()=>document.getElementById('addCust').classList.toggle('open');
document.getElementById('ncCancel').onclick=()=>document.getElementById('addCust').classList.remove('open');
document.getElementById('ncSave').onclick=()=>{const n=document.getElementById('ncName').value.trim();if(!n)return;addCustomer(n,document.getElementById('ncContact').value.trim());document.getElementById('ncName').value='';document.getElementById('ncContact').value='';document.getElementById('addCust').classList.remove('open');};
document.getElementById('importBtn').onclick=()=>document.getElementById('importFile').click();
document.getElementById('importFile').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{importJSON(JSON.parse(r.result));}catch(err){toast('Bad file',true);}};r.readAsText(f);};

function openLightbox(src){
  let lb=document.getElementById('lightbox');
  if(!lb){lb=document.createElement('div');lb.id='lightbox';lb.className='lightbox';lb.innerHTML='<span class="lbx">×</span><img>';document.body.appendChild(lb);
    lb.addEventListener('click',()=>lb.classList.remove('open'));
    document.addEventListener('keydown',e=>{if(e.key==='Escape')lb.classList.remove('open');});}
  lb.querySelector('img').src=src;lb.classList.add('open');
}
initAuth();
</script>
